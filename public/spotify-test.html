<!DOCTYPE html>
<html>
<head>
<title>Spotify Heights</title>
<style>
  body { font-family: sans-serif; background: #eee; padding: 20px; }
  .wrapper { margin-bottom: 20px; background: red; display: inline-block; }
  iframe { display: block; }
</style>
</head>
<body>
<h1>Testing Spotify Embed Heights</h1>

<div>
  <h3>Height 152 (Native Compact, reported to have white gap)</h3>
  <div class="wrapper">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/episode/3lKhgne1u3Eu58Fo45R7av?utm_source=generator" width="600" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>
</div>

<div>
  <h3>Height 152 but wrapped in 152px div</h3>
  <div class="wrapper" style="height: 152px; overflow: hidden; border-radius: 12px;">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/episode/3lKhgne1u3Eu58Fo45R7av?utm_source=generator" width="600" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>
</div>

</body>
</html>
