<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spotify Heights Test 3</title>
<style>
  body { font-family: sans-serif; background: #fff; padding: 20px; }
  .wrapper { margin-bottom: 20px; background: red; }
</style>
</head>
<body>
<h1>Testing Spotify Mobile Break</h1>

<div style="width: 375px; border: 1px dashed black;">
  <h3>Mobile Width (375px) - 232px Iframe inside 214px clip</h3>
  <div class="wrapper" style="height: 214px; overflow: hidden; border-radius: 12px; width: 100%;">
    <iframe src="https://open.spotify.com/embed/episode/3lKhgne1u3Eu58Fo45R7av?utm_source=generator" width="100%" height="232" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

  <h3>Mobile Width (375px) - 152px native</h3>
  <div class="wrapper" style="width: 100%;">
    <iframe src="https://open.spotify.com/embed/episode/3lKhgne1u3Eu58Fo45R7av?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>
</div>

</body>
</html>
